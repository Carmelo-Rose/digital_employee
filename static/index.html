<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电商运营数字员工</title>
  <link rel="stylesheet" href="/static/style.css" />
  <!-- Markdown 渲染（CDN，加载失败则回退纯文本展示） -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>
    <h1>电商运营数字员工</h1>
    <p class="sub">上传订单表后，系统会自动识别异常、生成运营日报，并在人工确认后推送到企业微信。</p>
  </header>

  <main>
    <section class="card">
      <h2>① 上传业务数据文件</h2>
      <div class="upload-row">
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" />
        <button id="uploadBtn">上传</button>
      </div>
      <div id="uploadInfo" class="info"></div>
      <!-- 业务域选择（上传后显示，自动推断 + 手动切换） -->
      <div id="domainBox" class="domain-box" hidden>
        <span class="domain-label">业务域：</span>
        <select id="domainSelect"></select>
        <span id="domainInferBadge" class="infer-badge"></span>
      </div>
      <div id="teachBox" class="teach-box" hidden></div>
    </section>

    <section class="card">
      <h2>② 开始分析</h2>
      <div class="options">
        <label><input type="checkbox" id="useLlm" checked /> 使用 AI 日报（调 LLM）</label>
        <label><input type="checkbox" id="forceMock" /> 强制 mock（不调真实模型）</label>
      </div>
      <button id="analyzeBtn" disabled>开始分析</button>
      <span id="analyzeStatus" class="status"></span>
    </section>

    <section class="card" id="stepsCard" hidden>
      <h2>③ 数字员工执行过程 <span class="badge">LangGraph 编排</span></h2>
      <ol id="steps" class="steps"></ol>
    </section>

    <section class="card" id="resultCard" hidden>
      <div class="result-head">
        <h2>④ AI 运营日报预览</h2>
        <div class="report-tools">
          <button id="copyBtn" class="ghost">📋 复制报告</button>
          <button id="downloadBtn" class="ghost">⬇️ 下载 Markdown</button>
        </div>
      </div>
      <div id="summary" class="summary"></div>
      <!-- 环比面板 -->
      <div id="comparePanel" class="compare-panel" hidden></div>
      <article id="report" class="report"></article>

      <!-- 编辑模式：直接改写日报后推送 -->
      <div id="editBox" class="edit-box" hidden>
        <textarea id="editArea" class="edit-area" spellcheck="false"></textarea>
        <div class="inline-actions">
          <button id="editSaveBtn">✅ 保存并推送</button>
          <button id="editCancelBtn" class="ghost">取消</button>
        </div>
      </div>

      <!-- 反馈重写：给 AI 修改意见，重新生成后再次复审 -->
      <div id="reviseBox" class="revise-box" hidden>
        <input id="reviseInput" type="text"
               placeholder="给 AI 的修改意见，例如：物流部分再展开写细一点、语气更简洁" />
        <div class="inline-actions">
          <button id="reviseSendBtn">🔁 提交并重写</button>
          <button id="reviseCancelBtn" class="ghost">取消</button>
        </div>
      </div>

      <div class="confirm-bar">
        <div class="confirm-hint">
          <span class="hitl-badge" id="hitlBadge">⏸ 等待人工审核</span>
          🧑‍💼 人工确认节点：图已在此中断（interrupt），请核对日报后选择操作。
        </div>
        <div class="confirm-actions">
          <button id="pushBtn">✅ 确认推送到企业微信</button>
          <button id="editBtn" class="ghost">✏️ 编辑后推送</button>
          <button id="reviseBtn" class="ghost">🔁 反馈重写</button>
          <button id="rejectBtn" class="btn-reject">🚫 不推送，仅保存</button>
        </div>
        <span id="pushStatus" class="status"></span>
      </div>
    </section>

    <!-- 业务规则记忆：字段映射纠正 + 阈值持久化 -->
    <section class="card" id="memoryCard">
      <div class="result-head">
        <h2>⚙️ 业务规则记忆 <span class="badge">跨任务复用</span></h2>
        <button id="refreshMemory" class="ghost">刷新</button>
      </div>
      <div class="mem-block">
        <h3>规则阈值（持久化，覆盖默认值）</h3>
        <div id="thresholdForm" class="threshold-form"></div>
        <button id="saveThresholds">保存阈值</button>
        <span id="memStatus" class="status"></span>
      </div>
      <div class="mem-block">
        <h3>已记住的字段映射纠正</h3>
        <div id="overrideList" class="override-list">
          <span class="info">暂无。上传文件后，可在「未识别列」处教数字员工识别。</span>
        </div>
      </div>
    </section>

    <!-- 历史报告面板 -->
    <section class="card" id="historyCard">
      <div class="result-head">
        <h2>📋 历史报告</h2>
        <button id="refreshHistory" class="ghost">刷新</button>
      </div>
      <div id="historyList" class="history-list">
        <span class="info">加载中…</span>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="/static/app.js"></script>
</body>
</html>
